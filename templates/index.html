<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Weight Tracker</h1>

        <div class="form-section">
            <form id="weight-form">
                <div class="form-group">
                    <label for="weight-input">Today's Weight (lbs):</label>
                    <input
                        type="number"
                        id="weight-input"
                        name="weight"
                        step="0.1"
                        min="0"
                        placeholder="Enter weight"
                        required
                        autofocus
                    >
                </div>
                <button type="submit" class="submit-btn">Submit Weight</button>
            </form>
            <div id="message" class="message"></div>
        </div>

        <div class="chart-section">
            <h2>Weight History</h2>
            <canvas id="weight-chart"></canvas>
        </div>

        <div class="journal-section">
            <h2>Health Journal</h2>

            <div class="journal-form">
                <form id="journal-form">
                    <div class="form-group">
                        <label for="journal-input">New Entry (Markdown supported):</label>
                        <textarea
                            id="journal-input"
                            name="content"
                            rows="6"
                            placeholder="Write your health journal entry... (supports **bold**, *italic*, # headings, - lists, etc.)"
                            required
                        ></textarea>
                        <div class="markdown-hint">
                            <small>Markdown: **bold**, *italic*, # headings, - lists, [links](url), etc.</small>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">Add Journal Entry</button>
                </form>
                <div id="journal-message" class="message"></div>
            </div>

            <div class="journal-entries">
                <h3>Recent Entries</h3>
                <div id="journal-list"></div>
            </div>
        </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
