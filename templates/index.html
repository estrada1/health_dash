<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <nav class="page-nav">
            <a href="/" class="active">Tracker</a>
            <a href="/journal">Journal</a>
            <a href="/diet">Diet</a>
        </nav>
        <h1>Tracker</h1>

        <div class="form-section">
            <form id="weight-form">
                <div class="form-group">
                    <label for="weight-input">Today's Weight (lbs):</label>
                    <input
                        type="number"
                        id="weight-input"
                        name="weight"
                        step="0.1"
                        min="0"
                        placeholder="Enter weight"
                        required
                        autofocus
                    >
                </div>
                <button type="submit" class="submit-btn">Submit Weight</button>
            </form>
            <div id="message" class="message"></div>
        </div>

        <div class="chart-section">
            <h2>Weight History</h2>
            <canvas id="weight-chart"></canvas>
        </div>

        <div class="workout-section">
            <h2>Workout Tracker</h2>

            <div class="workout-form">
                <form id="workout-form">
                    <div class="form-group">
                        <label for="workout-type">Workout Type:</label>
                        <select id="workout-type" name="workout_type" required>
                            <option value="">-- Select Workout Type --</option>
                            <option value="Running">Running</option>
                            <option value="Weights">Weights</option>
                            <option value="Swim">Swim</option>
                            <option value="Yoga">Yoga</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="workout-note">Notes (optional):</label>
                        <textarea
                            id="workout-note"
                            name="note"
                            rows="3"
                            maxlength="500"
                            placeholder="Add any details about your workout... (optional)"
                        ></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Log Workout</button>
                </form>
                <div id="workout-message" class="message"></div>
            </div>

            <div class="workout-calendar-container">
                <h3>Workout Calendar (Last 2 Months)</h3>
                <div id="workout-calendar"></div>
            </div>

            <div class="workout-timeline-container">
                <h3>Workout History</h3>
                <div id="workout-timeline"></div>
            </div>
        </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
